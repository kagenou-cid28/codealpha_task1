<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxora | Every Voice Understood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-primary: #FAFAF9;
            --surface: #FFFFFF;
            --sidebar: #F4F4F3;
            --text-primary: #18181B;
            --text-secondary: #71717A;
            --border: #E4E4E7;
            --accent: #D97757;
            --accent-hover: #C76545;
            --danger: #EF4444;
            --success: #16A34A;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background-color: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; }

        /* --- SMOOTH LOGO --- */
        .voxora-logo-svg { width: 36px; height: 36px; transition: var(--transition); }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-wrapper:hover .voxora-logo-svg { transform: rotate(5deg) scale(1.05); }
        .voxora-logo-large { width: 90px; height: 90px; margin-bottom: 24px; filter: drop-shadow(0 4px 10px rgba(217, 119, 87, 0.15)); }

        /* --- Sidebar --- */
        .sidebar { 
            width: 270px; background-color: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 24px 16px; z-index: 1000; transition: var(--transition);
        }
        
        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -270px; top: 0; bottom: 0; }
            .sidebar.open { left: 0; box-shadow: 15px 0 40px rgba(0,0,0,0.08); }
        }

        .sidebar-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); 
            z-index: 999; backdrop-filter: blur(3px);
        }
        .sidebar-overlay.active { display: block; }

        .logo-container { padding: 0 8px 32px 8px; }
        .logo-text { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.03em; }
        
        .new-btn { 
            background-color: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; 
            font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; 
            cursor: pointer; transition: var(--transition); margin-bottom: 32px; width: 100%;
        }

        /* --- History with Delete --- */
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 0 8px 10px 8px; }
        .nav-label { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; opacity: 0.6; }
        .clear-all-link { font-size: 0.65rem; font-weight: 700; color: var(--danger); text-transform: uppercase; cursor: pointer; }

        .history-list { list-style: none; overflow-y: auto; flex-grow: 1; }
        .history-item { 
            padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary); 
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; transition: var(--transition); 
        }
        .history-item:hover { background: rgba(0,0,0,0.05); color: var(--text-primary); }
        .history-item-content { display: flex; align-items: center; gap: 10px; flex: 1; overflow: hidden; }
        .history-item-content span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .delete-item-btn { 
            padding: 6px; border-radius: 6px; color: var(--text-secondary); opacity: 0; 
            background: transparent; border: none; cursor: pointer; transition: var(--transition);
        }
        .history-item:hover .delete-item-btn { opacity: 0.6; }
        .delete-item-btn:hover { opacity: 1 !important; color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* --- Main UI --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        header { 
            padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; 
            justify-content: space-between; align-items: center; background: var(--surface); 
            position: sticky; top: 0; z-index: 100; 
        }
        .menu-btn { display: none; background: none; border: none; cursor: pointer; color: var(--text-primary); margin-right: 15px; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700; color: var(--success); background: rgba(22, 163, 74, 0.08); padding: 6px 14px; border-radius: 100px; }
        .dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- Layout Grids --- */
        #landing-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; text-align: center; }
        .hero-title { font-size: 2.8rem; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.02em; line-height: 1.1; }
        .hero-subtitle { color: var(--text-secondary); max-width: 520px; line-height: 1.6; margin-bottom: 40px; font-size: 1.1rem; }
        .suggested-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 680px; width: 100%; }
        .suggested-card { background: var(--surface); border: 1px solid var(--border); padding: 22px; border-radius: 16px; text-align: left; cursor: pointer; transition: var(--transition); display: flex; justify-content: space-between; align-items: center; }
        .suggested-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        #workspace-view { display: none; padding: 40px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .controls-bar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        select { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: 500; cursor: pointer; min-width: 160px; }
        .swap-btn { background: var(--surface); border: 1px solid var(--border); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .swap-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

        .translation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .panel-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; display: flex; justify-content: space-between; }
        textarea, .output-box { width: 100%; min-height: 280px; padding: 24px; border: none; resize: none; font-family: var(--font-mono); font-size: 1rem; line-height: 1.7; }
        .output-box { background: #fcfcfc; overflow-y: auto; white-space: pre-wrap; }

        .panel-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; background: #fafafa; }
        .icon-btn { background: none; border: none; padding: 10px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; }
        .icon-btn:hover { color: var(--accent); background: #f0f0f0; }

        .execute-btn { background: var(--text-primary); color: white; border: none; padding: 18px 56px; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; margin: 0 auto; transition: var(--transition); font-size: 1.05rem; width: fit-content; }
        .execute-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        
        .spinning { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #file-input { display: none; }

        @media (max-width: 900px) {
            header { padding: 16px 20px; }
            .menu-btn { display: block; }
            .hero-title { font-size: 2.1rem; }
            .suggested-grid { grid-template-columns: 1fr; }
            .translation-grid { grid-template-columns: 1fr; }
            .execute-btn { width: 100%; justify-content: center; }
            .delete-item-btn { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo-container">
            <div class="logo-wrapper" onclick="goHome(); if(window.innerWidth <= 900) toggleSidebar();">
                <svg class="voxora-logo-svg" viewBox="0 0 100 100" fill="none">
                    <path d="M25 25 L75 75 M75 25 L25 75" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"/>
                    <path d="M30 80 L50 35 L70 80" stroke="var(--text-primary)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="58" r="4.5" fill="var(--text-primary)"/>
                </svg>
                <span class="logo-text">Voxora</span>
            </div>
        </div>
        
        <button class="new-btn" onclick="goHome(); if(window.innerWidth <= 900) toggleSidebar();">
            <i data-lucide="plus" size="20"></i> New Translation
        </button>
        
        <div class="nav-header">
            <span class="nav-label">History</span>
            <span class="clear-all-link" onclick="clearAllHistory()">Clear All</span>
        </div>
        <div class="history-list" id="history-list"></div>
    </aside>

    <main class="main-content">
        <header>
            <div style="display: flex; align-items: center;">
                <button class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary)">v5.6 / workspace_pro</div>
            </div>
            <div class="status-badge"><div class="dot"></div> ONLINE</div>
        </header>

        <div id="landing-view">
            <svg class="voxora-logo-large" viewBox="0 0 100 100" fill="none">
                <path d="M25 25 L75 75 M75 25 L25 75" stroke="var(--accent)" stroke-width="8" stroke-linecap="round"/>
                <path d="M30 80 L50 35 L70 80" stroke="var(--text-primary)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="50" cy="58" r="4" fill="var(--text-primary)"/>
            </svg>
            <h1 class="hero-title">Every Voice Understood.</h1>
            <p class="hero-subtitle">High-fidelity AI translation for technical and creative teams.</p>
            <div class="suggested-grid">
                <div class="suggested-card" onclick="quick('en', 'ta')">English to Tamil <i data-lucide="arrow-right"></i></div>
                <div class="suggested-card" onclick="quick('ta', 'en')">Tamil to English <i data-lucide="arrow-right"></i></div>
                <div class="suggested-card" onclick="document.getElementById('file-input').click()">Upload File (.pdf, .txt) <i data-lucide="upload-cloud"></i></div>
                <div class="suggested-card" onclick="quick('ja', 'en')">Japanese to English <i data-lucide="arrow-right"></i></div>
            </div>
        </div>

        <div id="workspace-view">
            <div class="controls-bar">
                <select id="src-lang">
                    <option value="en">English (US)</option>
                    <option value="ta">Tamil (தமிழ்)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="fr">French (Français)</option>
                    <option value="ja">Japanese (日本語)</option>
                </select>
                <button class="swap-btn" onclick="swapLangs()"><i data-lucide="repeat"></i></button>
                <select id="tgt-lang">
                    <option value="en">English (US)</option>
                    <option value="ta" selected>Tamil (தமிழ்)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="fr">French (Français)</option>
                    <option value="ja">Japanese (日本語)</option>
                </select>
            </div>

            <div class="translation-grid">
                <div class="panel">
                    <div class="panel-header">Source <span id="char-count">0 / 5000</span></div>
                    <textarea id="source-input" placeholder="Type or upload a document..."></textarea>
                    <div class="panel-footer">
                        <button class="icon-btn" onclick="clearInput()"><i data-lucide="trash-2"></i> Clear</button>
                        <button class="icon-btn" onclick="document.getElementById('file-input').click()"><i data-lucide="file-up"></i> Upload</button>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">Result <span id="latency-val" style="color:var(--accent)"></span></div>
                    <div id="translated-output" class="output-box" style="color: var(--text-secondary)">Waiting for input...</div>
                    <div class="panel-footer">
                        <div style="display:flex; gap: 8px;">
                            <button class="icon-btn" onclick="copyText()"><i data-lucide="copy"></i></button>
                            <button class="icon-btn" onclick="downloadText()"><i data-lucide="download"></i></button>
                        </div>
                        <button class="icon-btn" onclick="listenText()"><i data-lucide="volume-2"></i> Speak</button>
                    </div>
                </div>
            </div>
            <button class="execute-btn" id="exec-btn" onclick="runTranslation()"><i data-lucide="zap"></i> Execute Translation</button>
        </div>
    </main>

    <input type="file" id="file-input" accept=".txt, .pdf" onchange="handleFileUpload(event)">

    <script>
        lucide.createIcons();
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const landing = document.getElementById('landing-view');
        const workspace = document.getElementById('workspace-view');
        const sourceInput = document.getElementById('source-input');
        const outputBox = document.getElementById('translated-output');
        const srcSelect = document.getElementById('src-lang');
        const tgtSelect = document.getElementById('tgt-lang');
        const execBtn = document.getElementById('exec-btn');
        const histContainer = document.getElementById('history-list');

        let history = JSON.parse(localStorage.getItem('voxora_final_db')) || [];
        renderHistory();

        function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); }
        sourceInput.oninput = () => document.getElementById('char-count').innerText = `${sourceInput.value.length} / 5000`;
        function goHome() { landing.style.display = 'flex'; workspace.style.display = 'none'; }
        function quick(s, t) { landing.style.display = 'none'; workspace.style.display = 'block'; srcSelect.value = s; tgtSelect.value = t; if(window.innerWidth > 900) sourceInput.focus(); }
        function swapLangs() { const t = srcSelect.value; srcSelect.value = tgtSelect.value; tgtSelect.value = t; }
        function clearInput() { sourceInput.value = ''; outputBox.innerText = 'Waiting...'; outputBox.style.color = "var(--text-secondary)"; }

        async function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            quick(srcSelect.value, tgtSelect.value); sourceInput.value = "Processing document...";
            if (file.type === "text/plain") {
                const r = new FileReader(); r.onload = (e) => sourceInput.value = e.target.result; r.readAsText(file);
            } else if (file.type === "application/pdf") {
                const r = new FileReader(); r.onload = async function() {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ") + "\n";
                    }
                    sourceInput.value = fullText.trim();
                };
                r.readAsArrayBuffer(file);
            }
            event.target.value = '';
        }

        async function runTranslation() {
            const text = sourceInput.value.trim(); if (!text || text.startsWith("Processing")) return;
            execBtn.disabled = true; execBtn.innerHTML = `<i data-lucide="loader-2" class="spinning"></i> Working...`; lucide.createIcons();
            outputBox.innerText = "Generating output..."; outputBox.style.color = "var(--text-primary)";
            const start = Date.now();
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcSelect.value}&tl=${tgtSelect.value}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url); const data = await res.json();
                if (data && data[0]) {
                    const result = data[0].map(p => p[0]).join("");
                    outputBox.innerText = result;
                    document.getElementById('latency-val').innerText = `${Date.now() - start}ms`;
                    saveHistory(text, result);
                }
            } catch (e) { outputBox.innerText = "Error: Check connection."; }
            finally { execBtn.disabled = false; execBtn.innerHTML = `<i data-lucide="zap"></i> Execute Translation`; lucide.createIcons(); }
        }

        function saveHistory(q, a) {
            history.unshift({ q, a, id: Date.now() });
            if (history.length > 15) history.pop();
            localStorage.setItem('voxora_final_db', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                histContainer.innerHTML = `<p style="padding: 20px; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.5; text-align: center;">No recent activity.</p>`;
                return;
            }
            histContainer.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistory('${item.id}')">
                    <div class="history-item-content"><i data-lucide="file-text" size="16"></i><span>${item.q.substring(0,22)}...</span></div>
                    <button class="delete-item-btn" onclick="deleteHistoryItem('${item.id}', event)"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteHistoryItem(id, e) {
            e.stopPropagation();
            // Use String comparison to avoid type mismatches
            history = history.filter(item => String(item.id) !== String(id));
            localStorage.setItem('voxora_final_db', JSON.stringify(history));
            renderHistory();
        }

        function clearAllHistory() {
            if (confirm("Delete all history?")) { history = []; localStorage.setItem('voxora_final_db', JSON.stringify(history)); renderHistory(); }
        }

        function loadHistory(id) {
            const item = history.find(i => String(i.id) === String(id));
            if(item) { quick(srcSelect.value, tgtSelect.value); sourceInput.value = item.q; outputBox.innerText = item.a; outputBox.style.color = "var(--text-primary)"; if(window.innerWidth <= 900) toggleSidebar(); }
        }

        function copyText() { navigator.clipboard.writeText(outputBox.innerText); alert("Copied!"); }
        function downloadText() { const b = new Blob([outputBox.innerText], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `voxora_${Date.now()}.txt`; a.click(); }
        function listenText() { const s = new SpeechSynthesisUtterance(outputBox.innerText); s.lang = tgtSelect.value; window.speechSynthesis.speak(s); }
    </script>
</body>
</html>
